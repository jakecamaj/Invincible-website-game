<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invincible: Dodge</title>
  <style>
    body {
      margin: 0;
      background: #0b1021;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }
    h1 {
      margin: 20px 0 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #score {
      font-size: 24px;
      margin-bottom: 10px;
    }
    #game {
      position: relative;
      width: 700px;
      height: 400px;
      margin: 0 auto;
      background: linear-gradient(#1a2750, #0b1021);
      border: 3px solid #57c4f5;
      border-radius: 12px;
      overflow: hidden;
    }
    #player {
      position: absolute;
      left: 60px;
      top: 180px;
      width: 80px;
      height: 50px;
      z-index: 5;
      transition: top 0.05s linear;
    }
    #player img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .obstacle {
      position: absolute;
      width: 30px;
      height: 30px;
      background: #ff3b3b;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff3b3b;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay.hidden {
      display: none;
    }
    button {
      background: #0082ff;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    button:hover {
      background: #006ad1;
    }
    #message {
      font-size: 22px;
    }
    .controls {
      margin-top: 12px;
      color: #9bb4d6;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Invincible: Dodge</h1>
  <div id="score">Score: 0</div>

  <div id="game">
    <div id="player">
      <img src="mark.png" alt="Mark">
    </div>
    <div id="overlay">
      <div id="message">Avoid the obstacles!</div>
      <button id="startBtn">Start Game</button>
    </div>
  </div>

  <div class="controls">Use &uarr; / &darr; or W / S to move</div>

  <script>
    const game = document.getElementById('game');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const overlay = document.getElementById('overlay');
    const message = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');

    const GAME_W = 700;
    const GAME_H = 400;
    const PLAYER_W = 80;
    const PLAYER_H = 50;
    const PLAYER_X = 60;
    const STEP = 25;

    let playerY = 180;
    let obstacles = [];
    let running = false;
    let score = 0;
    let spawnTimer = 0;
    let speed = 3;
    let frameId = null;

    function resetGame() {
      // remove old obstacles
      obstacles.forEach(o => o.el.remove());
      obstacles = [];
      playerY = 180;
      player.style.top = playerY + 'px';
      score = 0;
      speed = 3;
      spawnTimer = 0;
      scoreEl.textContent = 'Score: 0';
    }

    function startGame() {
      resetGame();
      overlay.classList.add('hidden');
      running = true;
      loop();
    }

    function endGame() {
      running = false;
      cancelAnimationFrame(frameId);
      message.textContent = 'Game Over! Score: ' + score;
      startBtn.textContent = 'Play Again';
      overlay.classList.remove('hidden');
    }

    function spawnObstacle() {
      const el = document.createElement('div');
      el.className = 'obstacle';
      const y = Math.random() * (GAME_H - 30);
      el.style.left = GAME_W + 'px';
      el.style.top = y + 'px';
      game.appendChild(el);
      obstacles.push({ el: el, x: GAME_W, y: y });
    }

    function loop() {
      if (!running) return;

      // spawn obstacles over time
      spawnTimer++;
      if (spawnTimer > 60) {
        spawnObstacle();
        spawnTimer = 0;
      }

      // move obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.x -= speed;
        o.el.style.left = o.x + 'px';

        // collision check
        if (
          o.x < PLAYER_X + PLAYER_W &&
          o.x + 30 > PLAYER_X &&
          o.y < playerY + PLAYER_H &&
          o.y + 30 > playerY
        ) {
          endGame();
          return;
        }

        // remove off-screen, add score
        if (o.x < -30) {
          o.el.remove();
          obstacles.splice(i, 1);
          score++;
          scoreEl.textContent = 'Score: ' + score;
          if (score % 5 === 0) speed += 0.5; // gets harder
        }
      }

      frameId = requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', function(e) {
      if (!running) return;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
        playerY = Math.max(0, playerY - STEP);
        player.style.top = playerY + 'px';
      }
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
        playerY = Math.min(GAME_H - PLAYER_H, playerY + STEP);
        player.style.top = playerY + 'px';
      }
    });

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
